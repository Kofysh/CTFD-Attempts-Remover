{% extends "base.html" %}

{% block content %}
<script src="/plugins/ctfd-attempts-remover/assets/remover_i18n.js"></script>
<br><br><br>

<!-- Centred container -->
<div class="container" style="max-width: 1000px; margin: 0 auto; padding: 0 30px;">
  
  <!-- CARD -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="custom-card-header d-flex align-items-center justify-content-between p-4">
        <div class="d-flex align-items-center">
          <div class="header-icon-wrapper mr-4">
            <i class="fas fa-unlock-alt fa-2x"></i>
          </div>
          <div style="padding-left: 8px;">
            <h1 class="mb-1 font-weight-bold custom-text-primary" data-i18n="header_title">Unblock Center</h1>
            <p class="mb-0 custom-text-muted" data-i18n="header_subtitle">Manage your blocked challenges</p>
          </div>
        </div>
        <div>
          <a href="/challenges" class="btn custom-btn-secondary">
            <i class="fas fa-arrow-left mr-2"></i><span data-i18n="back_to_challenges">Back to challenges</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Penalty configuration banner -->
  <div class="row mb-4">
    <div class="col-12">
      <div id="penalty-mode" class="custom-alert-info p-3">
        <div class="d-flex align-items-center justify-content-center">
          <div class="spinner-border spinner-border-sm custom-text-info mr-3" role="status"></div>
          <span class="font-weight-medium" data-i18n="loading_config">Loading configuration...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main card with tabs -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="custom-card">
        <!-- Tab header -->
        <div class="custom-card-header p-0">
          <div class="custom-tabs d-flex">
            <button class="custom-tab-btn active flex-fill text-center py-3" id="blocked-tab" data-target="blocked-content">
              <i class="fas fa-exclamation-triangle mr-2"></i><span data-i18n="tab_blocked">Blocked Challenges</span>
            </button>
            <button class="custom-tab-btn flex-fill text-center py-3" id="history-tab" data-target="history-content">
              <i class="fas fa-history mr-2"></i><span data-i18n="tab_history">History</span>
            </button>
          </div>
        </div>

        <!-- Tab content panels -->
        <div class="custom-card-body p-4">
          <!-- Blocked challenges tab -->
          <div id="blocked-content" class="tab-content-panel active">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="mb-0 font-weight-bold custom-text-primary">
                <i class="fas fa-lock mr-2 text-warning"></i><span data-i18n="blocked_section_title">Currently blocked challenges</span>
              </h4>
              <button class="btn custom-btn-outline" onclick="location.reload();">
                <i class="fas fa-sync-alt mr-2"></i><span data-i18n="refresh">Refresh</span>
              </button>
            </div>

            <div id="blocked-list">
              <div class="text-center py-5">
                <div class="spinner-border custom-text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                <p class="custom-text-muted font-weight-medium" data-i18n="loading">Loading...</p>
              </div>
            </div>
          </div>

          <!-- History tab -->
          <div id="history-content" class="tab-content-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="mb-0 font-weight-bold custom-text-primary">
                <i class="fas fa-clock mr-2 text-info"></i><span data-i18n="processed_requests_title">Processed requests</span>
              </h4>
              <button class="btn custom-btn-outline" onclick="loadHistory();">
                <i class="fas fa-sync-alt mr-2"></i><span data-i18n="refresh">Refresh</span>
              </button>
            </div>
            
            <div id="history-section">
              <div class="text-center py-4">
                <div class="spinner-border spinner-border-sm custom-text-primary mb-2" role="status"></div>
                <p class="custom-text-muted mb-0" data-i18n="loading">Loading...</p>
              </div>
            </div>
            <nav>
              <ul id="pagination" class="pagination justify-content-center mt-3"></ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<br><br>

<style>

/* ── Adaptive theme: light / dark via data-bs-theme ── */
:root,
[data-bs-theme="light"] {
  --custom-bg-primary:     #ffffff;
  --custom-bg-secondary:   #f8f9fa;
  --custom-bg-tertiary:    #e9ecef;
  --custom-text-primary:   #212529;
  --custom-text-secondary: #6c757d;
  --custom-text-muted:     #6c757d;
  --custom-border:         #dee2e6;
  --custom-shadow:         rgba(0, 0, 0, 0.08);
  --custom-btn-primary:    #0d6efd;
  --custom-btn-secondary:  #6c757d;
  --custom-success:        #198754;
  --custom-warning:        #ffc107;
  --custom-danger:         #dc3545;
  --custom-info:           #0dcaf0;
}

[data-bs-theme="dark"] {
  --custom-bg-primary:     #212529;
  --custom-bg-secondary:   #2b3035;
  --custom-bg-tertiary:    #343a40;
  --custom-text-primary:   #dee2e6;
  --custom-text-secondary: #adb5bd;
  --custom-text-muted:     #adb5bd;
  --custom-border:         #495057;
  --custom-shadow:         rgba(0, 0, 0, 0.3);
  --custom-btn-primary:    #0d6efd;
  --custom-btn-secondary:  #6c757d;
  --custom-success:        #198754;
  --custom-warning:        #ffc107;
  --custom-danger:         #dc3545;
  --custom-info:           #0dcaf0;
}
/* Styles de base */
.custom-card {
  background-color: var(--custom-bg-primary);
  border: 1px solid var(--custom-border);
  border-radius: 60px;
  box-shadow: 0 4px 20px var(--custom-shadow);
  overflow: hidden;
}

.custom-card-header {
  background: linear-gradient(135deg, var(--custom-bg-secondary) 0%, var(--custom-bg-tertiary) 100%);
  border-bottom: 1px solid var(--custom-border);
  border-radius: 70px 70px 0 0;
}

.custom-card-body {
  background-color: var(--custom-bg-primary);
}

.header-icon-wrapper {
  background-color: var(--custom-bg-primary);
  color: var(--custom-text-secondary);
  border-radius: 50%;
  box-shadow: 0 2px 10px var(--custom-shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  flex-shrink: 0;
}

.header-icon-wrapper .fas {
  margin-right: 0 !important;
}

/* Onglets */
.custom-tabs {
  border-bottom: 2px solid var(--custom-border);
}

.custom-tab-btn {
  background: transparent;
  border: none;
  color: var(--custom-text-secondary);
  font-weight: 500;
  transition: all 0.25s ease;
  position: relative;
  border-bottom: 3px solid transparent;
  padding-top: 1rem;
  padding-bottom: 1rem;
  margin-bottom: -2px;
}

.custom-tab-btn:hover {
  color: var(--custom-text-primary);
}

.custom-tab-btn.active {
  color: var(--custom-btn-primary);
  border-bottom: 3px solid var(--custom-btn-primary);
  font-weight: 700;
}

.custom-tab-btn.active i {
  color: var(--custom-btn-primary);
}

.custom-tab-btn:focus {
  outline: none;
  box-shadow: none;
}

/* Contenu des onglets */
.tab-content-panel {
  display: none;
}

.tab-content-panel.active {
  display: block;
}

/* Textes */
.custom-text-primary {
  color: var(--custom-text-primary) !important;
}

.custom-text-muted {
  color: var(--custom-text-muted) !important;
}

.custom-text-info {
  color: var(--custom-info) !important;
}

.custom-link {
  color: var(--custom-btn-primary) !important;
}

/* Boutons */
.custom-btn-secondary {
  background-color: var(--custom-btn-secondary);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.custom-btn-secondary:hover {
  background-color: var(--custom-text-secondary);
  color: white;
  transform: translateY(-1px);
  box-shadow: 0 4px 15px var(--custom-shadow);
}

.custom-btn-outline {
  background: transparent;
  color: var(--custom-text-secondary);
  border: 1px solid var(--custom-border);
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.custom-btn-outline:hover {
  background-color: var(--custom-bg-secondary);
  color: var(--custom-text-primary);
  border-color: var(--custom-text-secondary);
}

.fas {
  margin-right: 8px !important;
}

/* Alertes */
.custom-alert-info {
  background-color: var(--custom-bg-secondary);
  border: 1px solid var(--custom-border);
  border-left: 4px solid var(--custom-info);
  border-radius: 12px;
  color: var(--custom-text-primary);
}

/* position petit bulle "i" */
.custom-alert-info .fas {
  flex-shrink: 0;
}

/* Responsive challenge card header */
.challenge-card-header {
  flex-wrap: wrap;
  gap: 0.5rem;
}
@media (max-width: 576px) {
  .container {
    padding: 0 12px !important;
  }
  .challenge-card {
    padding: 1rem !important;
  }
  .challenge-card-header .badge {
    align-self: flex-start;
  }
}

/* Cards de challenges */
.challenge-card {
  background-color: var(--custom-bg-primary);
  border: 1px solid var(--custom-border);
  border-radius: 15px;
  transition: all 0.3s ease;
  margin-bottom: 1rem;
}

.challenge-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px var(--custom-shadow);
}

.challenge-card.requested {
  border-left: 4px solid var(--custom-success);
  background-color: var(--custom-bg-secondary);
}

.challenge-card.pending {
  border-left: 4px solid var(--custom-warning);
}

.challenge-icon {
  background-color: var(--custom-bg-secondary);
  color: var(--custom-text-secondary);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 1.1rem;
  line-height: 1;
}

/* Tableaux */
.table {
  background-color: var(--custom-bg-primary);
  color: var(--custom-text-primary);
}

.table th {
  background: linear-gradient(135deg, var(--custom-bg-secondary) 0%, var(--custom-bg-tertiary) 100%);
  border: none;
  color: var(--custom-text-primary);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
  padding: 1rem;
}

.table td {
  border-color: var(--custom-border);
  padding: 1rem;
  vertical-align: middle;
  background-color: var(--custom-bg-primary) !important;
  color: var(--custom-text-primary) !important;
}

/* History table — bordered + header sombre */
.history-table {
  border: 2px solid #495057 !important;
  overflow: hidden;
}

.history-table thead th {
  background: linear-gradient(135deg, #343a40 0%, #495057 100%) !important;
  color: #ffffff !important;
  border: 1px solid #6c757d !important;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.8px;
}

.history-table tbody td {
  border: 1px solid #dee2e6 !important;
}

[data-bs-theme="dark"] .history-table tbody td {
  border-color: #495057 !important;
}

.table-hover tbody tr:hover {
  background-color: var(--custom-bg-secondary) !important;
}

.table tbody tr {
  background-color: var(--custom-bg-primary);
}

.table tbody td {
  vertical-align: middle !important;
  color: var(--custom-text-primary) !important;
  background-color: var(--custom-bg-primary) !important;
}

/* Force la couleur du texte dans le tableau pour dark mode */
.table .custom-text-primary {
  color: var(--custom-text-primary) !important;
}

.table .custom-text-muted {
  color: var(--custom-text-muted) !important;
}

.table .custom-text-info {
  color: var(--custom-info) !important;
}

/* Pagination */
.page-link {
  background-color: var(--custom-bg-primary);
  border-color: var(--custom-border);
  color: var(--custom-text-primary);
  border-radius: 8px;
  margin: 0 2px;
}

.page-link:hover {
  background-color: var(--custom-bg-secondary);
  border-color: var(--custom-text-secondary);
  color: var(--custom-text-primary);
}

.page-item.active .page-link {
  background-color: var(--custom-btn-primary);
  border-color: var(--custom-btn-primary);
  color: white;
}

/* Spacing for all icons inside tables */
.table i {
  margin-right: 8px !important;
}

/* Specific spacing for FontAwesome icons inside table divs */
.table .fas {
  margin-right: 8px !important;
}

/* Ensure consistent icon spacing throughout the card */
.custom-card i.fas {
  margin-right: 8px !important;
}

/* Badge */
.custom-badge {
  background-color: var(--custom-btn-primary);
  color: white;
  border-radius: 15px;
  font-size: 0.75rem;
}

/* Footer */
.custom-footer {
  background: linear-gradient(135deg, var(--custom-bg-secondary) 0%, var(--custom-bg-tertiary) 100%);
  border-top: 1px solid var(--custom-border);
}

/* Animations */
.spinner-border {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Responsive */
@media (max-width: 768px) {
  .custom-tabs {
    flex-direction: column;
  }
  
  .custom-tab-btn {
    border-bottom: none;
    border-right: 3px solid transparent;
  }
  
  .custom-tab-btn.active {
    border-bottom: none;
    border-right-color: var(--custom-btn-primary);
  }
}
</style>

<script>
// i18n helper (falls back gracefully if RemoverI18n not yet loaded)
function _t(key, vars) {
  return (window.RemoverI18n ? RemoverI18n.t(key, vars) : key);
}

let historyLoaded = false;

document.addEventListener("DOMContentLoaded", async () => {
  if (window.RemoverI18n) RemoverI18n.apply();

  const container = document.getElementById("blocked-list");
  const modeBox = document.getElementById("penalty-mode");

  // Tab management
  const tabButtons = document.querySelectorAll('.custom-tab-btn');
  const tabPanels = document.querySelectorAll('.tab-content-panel');

  tabButtons.forEach(button => {
    button.addEventListener('click', () => {
      const targetId = button.getAttribute('data-target');
      tabButtons.forEach(btn => btn.classList.remove('active'));
      tabPanels.forEach(panel => panel.classList.remove('active'));
      button.classList.add('active');
      document.getElementById(targetId).classList.add('active');
      if (targetId === 'history-content' && !historyLoaded) {
        loadHistory();
        historyLoaded = true;
      }
    });
  });

  function setBtnState(btn, iconClass, labelKey) {
    btn.textContent = '';
    const ic = document.createElement('i'); ic.className = iconClass; btn.appendChild(ic);
    btn.appendChild(document.createTextNode('\u00a0' + _t(labelKey)));
  }

  // GET-only fetch wrapper; redirects to login if the session has expired.
  // Use CTFd.fetch() for POST requests so CSRF is handled automatically.
  async function secureFetchJson(url, options = {}) {
    const res = await fetch(url, { credentials: "same-origin", ...options });
    if (res.redirected && res.url.includes("/login")) {
      window.location.href = res.url;
      return null;
    }
    return res.json();
  }

  // Safe helper: creates an element and sets its text content (no innerHTML)
  function createTextElement(tagName, text, className = '') {
    const element = document.createElement(tagName);
    element.textContent = text;
    if (className) element.className = className;
    return element;
  }

  try {
    const config = await secureFetchJson("/api/v1/attempts_remover/config");
    if (!config) return;

    const { mode, fixed_cost, percent_cost } = config;

    // Render the current penalty configuration banner
    modeBox.className = "custom-alert-info p-3";
    modeBox.innerHTML = '';
    
    const flexDiv = document.createElement('div');
    flexDiv.className = 'd-flex align-items-center justify-content-center text-center';
    
    const icon = document.createElement('i');
    icon.className = 'fas fa-info-circle mr-3 custom-text-info';  
    
    // Build the penalty configuration summary string
let configText = mode === "fixed"
  ? _t('penalty_fixed', { cost: fixed_cost })
  : _t('penalty_percent', { pct: percent_cost });

if (config.single_attempt_enabled) {
  const singleText = config.single_attempt_mode === "fixed"
    ? `${config.single_attempt_fixed_cost} pts`
    : `${config.single_attempt_percent_cost}%`;
  configText += ' — ' + _t('cost_single_attempt', { cost: singleText });
}

const span = createTextElement('span', configText, 'ml-2 custom-text-muted');
    
    flexDiv.appendChild(icon);
    flexDiv.appendChild(span);
    modeBox.appendChild(flexDiv);

    // Append a penalty warning below the configuration summary
    const warningDiv = document.createElement('div');
    warningDiv.className = 'd-flex align-items-center justify-content-center text-center mt-2';
    //warningDiv.style.fontStyle = 'italic';
    warningDiv.style.fontSize = '14px';

    const warningText = createTextElement('span', _t('penalty_warning'), 'custom-text-muted');
    warningDiv.appendChild(warningText);
    modeBox.appendChild(warningDiv);

    const [blocked, requests, singleRequests] = await Promise.all([
    secureFetchJson("/api/v1/attempts_remover/blocked"),
    secureFetchJson("/api/v1/attempts_remover/my_requests"),
    secureFetchJson("/api/v1/attempts_remover/my_single_requests")
  ]);

    if (!blocked) return;

    container.innerHTML = '';

    if (blocked.length === 0) {
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'text-center py-5';
      
      const icon = document.createElement('i');
      icon.className = 'fas fa-check-circle text-success mb-3';
      icon.style.fontSize = '3rem';
      
      const title = createTextElement('h4', _t('no_blocked'), 'text-success font-weight-bold');
      const subtitle = createTextElement('p', _t('all_accessible'), 'custom-text-muted');
      
      emptyDiv.appendChild(icon);
      emptyDiv.appendChild(title);
      emptyDiv.appendChild(subtitle);
      container.appendChild(emptyDiv);
    } else {
      blocked.forEach(chal => {
        const cost = mode === "fixed"
          ? `${fixed_cost} pts`
          : `${Math.max(1, Math.ceil((chal.value || 0) * percent_cost / 100))} pts (${percent_cost}%)`;

        const alreadyRequested = requests?.some(r => r.challenge_id === chal.challenge_id);

        const card = document.createElement("div");
        card.className = `challenge-card p-4 ${alreadyRequested ? 'requested' : 'pending'}`;

        // Card header: challenge name, point value, and status badge
        const headerDiv = document.createElement("div");
        headerDiv.className = "d-flex align-items-center justify-content-between mb-3 challenge-card-header";
        
        const leftDiv = document.createElement("div");
        leftDiv.className = "d-flex align-items-center";
        
        const challengeIcon = document.createElement("div");
        challengeIcon.className = "challenge-icon mr-3";
        challengeIcon.innerHTML = '<i class="fas fa-flag"></i>';
        
        const titleDiv = document.createElement("div");
        const title = createTextElement("h5", chal.challenge_name, "mb-1 font-weight-bold custom-text-primary");
        const subtitle = createTextElement("small", `${chal.value} points`, "custom-text-muted");
        titleDiv.appendChild(title);
        titleDiv.appendChild(subtitle);
        
        leftDiv.appendChild(challengeIcon);
        leftDiv.appendChild(titleDiv);
        
        const statusBadge = document.createElement("span");
        statusBadge.className = `badge ${alreadyRequested ? 'badge-success' : 'badge-warning'} px-3 py-2`;
        statusBadge.style.borderRadius = "10px";
        statusBadge.style.color = '#212529';
        statusBadge.textContent = alreadyRequested ? _t('status_in_progress') : _t('status_blocked');
        
        headerDiv.appendChild(leftDiv);
        headerDiv.appendChild(statusBadge);


        // Compute the cost for a single attempt grant
        const singleCost = config.single_attempt_mode === "fixed"
          ? `${config.single_attempt_fixed_cost} pts`
          : `${Math.max(1, Math.ceil((chal.value || 0) * config.single_attempt_percent_cost / 100))} pts (${config.single_attempt_percent_cost}%)`;

        // Info row: attempt counter + penalty costs
        const infoDiv = document.createElement("div");
        infoDiv.className = "row mb-4";

        const col1 = document.createElement("div");
        col1.className = "col-sm-6 mb-2";
        const attemptsP = document.createElement("p");
        attemptsP.className = "mb-0";
        const attemptsIcon = document.createElement("i");
        attemptsIcon.className = "fas fa-exclamation-triangle text-warning mr-3";
        attemptsP.appendChild(attemptsIcon);
        attemptsP.appendChild(createTextElement("span", _t('attempts_label', { current: chal.fail_count, max: chal.max_attempts }), "custom-text-primary"));
        col1.appendChild(attemptsP);

        const col2 = document.createElement("div");
        col2.className = "col-sm-6 mb-2";

        // Full unblock cost line
        const costFullP = document.createElement("p");
        costFullP.className = "mb-1";
        const costFullIcon = document.createElement("i");
        costFullIcon.className = "fas fa-unlock custom-text-info mr-3";
        costFullP.appendChild(costFullIcon);
        costFullP.appendChild(createTextElement("span", _t('cost_full_unblock', { cost }), "custom-text-primary"));
        col2.appendChild(costFullP);

        // Single attempt cost line (only shown when the feature is enabled)
        if (config.single_attempt_enabled) {
          const costSingleP = document.createElement("p");
          costSingleP.className = "mb-0";
          const costSingleIcon = document.createElement("i");
          costSingleIcon.className = "fas fa-plus custom-text-success mr-3";
          costSingleIcon.style.color = "#000000";
          costSingleP.appendChild(costSingleIcon);
          costSingleP.appendChild(createTextElement("span", _t('cost_single_attempt', { cost: singleCost }), "custom-text-primary"));
          col2.appendChild(costSingleP);
        }

        infoDiv.appendChild(col1);
        infoDiv.appendChild(col2);

        // Check whether a single-attempt request is already pending for this challenge
        const alreadyRequestedSingle = singleRequests?.some(r => r.challenge_id === chal.challenge_id);

        // Action buttons — layout depends on which requests are already pending
        const buttonsDiv = document.createElement("div");

        if (alreadyRequested) {
          // A full unblock request is already in progress
          const btn = document.createElement("button");
          btn.className = "btn btn-success w-100 py-3";
          btn.style.borderRadius = "12px";
          btn.disabled = true;
          const _fullPendIcon = document.createElement('i'); _fullPendIcon.className = 'fas fa-unlock mr-2'; btn.appendChild(_fullPendIcon);
          btn.appendChild(document.createTextNode(_t('btn_full_pending')));
          buttonsDiv.appendChild(btn);
        } else if (alreadyRequestedSingle) {
          // Single attempt request in progress
          const btn = document.createElement("button");
          btn.className = "btn btn-info w-100 py-3";
          btn.style.borderRadius = "12px";
          btn.disabled = true;
          const _singlePendIcon = document.createElement('i'); _singlePendIcon.className = 'fas fa-plus mr-2'; btn.appendChild(_singlePendIcon);
          btn.appendChild(document.createTextNode(_t('btn_single_pending')));
          buttonsDiv.appendChild(btn);
        } else {
          // No pending request — show available action buttons
          const row1 = document.createElement("div");
          row1.className = "row";
          
          // Full unblock button
          const col1 = document.createElement("div");
          col1.className = config.single_attempt_enabled ? "col-6" : "col-12";
          const fullBtn = document.createElement("button");
          fullBtn.className = "btn btn-primary w-100 py-3";
          fullBtn.style.borderRadius = "12px";
          const _fullIcon = document.createElement('i'); _fullIcon.className = 'fas fa-unlock mr-2'; fullBtn.appendChild(_fullIcon); fullBtn.appendChild(document.createTextNode(_t('btn_full_unblock')));
          col1.appendChild(fullBtn);
          row1.appendChild(col1);
          
          // Single attempt button (only shown when the feature is enabled)
          if (config.single_attempt_enabled) {
            const col2 = document.createElement("div");
            col2.className = "col-6";
            const singleBtn = document.createElement("button");
            singleBtn.className = "btn btn-success w-100 py-3";
            singleBtn.style.borderRadius = "12px";
            const _singleIcon = document.createElement('i'); _singleIcon.className = 'fas fa-plus mr-2'; singleBtn.appendChild(_singleIcon); singleBtn.appendChild(document.createTextNode(_t('btn_single_attempt')));
            col2.appendChild(singleBtn);
            row1.appendChild(col2);
            
            // Event listener for single attempt request
            singleBtn.addEventListener("click", async () => {
              singleBtn.disabled = true;
              setBtnState(singleBtn, 'fas fa-spinner fa-spin mr-2', 'sending');
              try {
                const res = await CTFd.fetch("/api/v1/attempts_remover/request_single_attempt", {
                  method: "POST",
                  credentials: "same-origin",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ challenge_id: chal.challenge_id })
                });
                const data = await res.json();
                if (data?.success) {
                  setBtnState(singleBtn, 'fas fa-check mr-2', 'request_sent');
                  setTimeout(() => window.location.reload(), 1000);
                } else {
                  singleBtn.className = "btn btn-danger w-100 py-3";
                  setBtnState(singleBtn, 'fas fa-exclamation-triangle mr-2', 'error');
                  singleBtn.disabled = false;
                }
              } catch (e) {
                console.error(e);
                singleBtn.className = "btn btn-danger w-100 py-3";
                setBtnState(singleBtn, 'fas fa-wifi mr-2', 'network_error');
                singleBtn.disabled = false;
              }
            });
          }
          
          buttonsDiv.appendChild(row1);
          
          // Event listener for full unblock request
          fullBtn.addEventListener("click", async () => {
            fullBtn.disabled = true;
            setBtnState(fullBtn, 'fas fa-spinner fa-spin mr-2', 'sending');
            try {
              const res = await CTFd.fetch("/api/v1/attempts_remover/request_support", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ challenge_id: chal.challenge_id })
              });
              const data = await res.json();
              if (data?.success) {
                setBtnState(fullBtn, 'fas fa-check mr-2', 'request_sent');
                setTimeout(() => window.location.reload(), 1000);
              } else {
                fullBtn.className = "btn btn-danger w-100 py-3";
                setBtnState(fullBtn, 'fas fa-exclamation-triangle mr-2', 'error');
                fullBtn.disabled = false;
              }
            } catch (e) {
              console.error(e);
              fullBtn.className = "btn btn-danger w-100 py-3";
              setBtnState(fullBtn, 'fas fa-wifi mr-2', 'network_error');
              fullBtn.disabled = false;
            }
          });
        }

        card.appendChild(headerDiv);
        card.appendChild(infoDiv);
        card.appendChild(buttonsDiv);
        container.appendChild(card);

      });
    }

  } catch (e) {
    console.error(e);
    container.textContent = '';
    const errDiv = document.createElement('div');
    errDiv.className = 'text-center py-5';
    const errIcon = document.createElement('i');
    errIcon.className = 'fas fa-exclamation-triangle text-danger fa-3x mb-3';
    const errTitle = document.createElement('h4');
    errTitle.className = 'text-danger';
    errTitle.textContent = _t('loading_error');
    const errMsg = document.createElement('p');
    errMsg.className = 'custom-text-muted';
    errMsg.textContent = _t('error_load_data');
    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn custom-btn-outline';
    retryBtn.onclick = () => location.reload();
    const retryIcon = document.createElement('i'); retryIcon.className = 'fas fa-sync-alt mr-2';
    retryBtn.appendChild(retryIcon);
    retryBtn.appendChild(document.createTextNode(_t('retry')));
    errDiv.appendChild(errIcon);
    errDiv.appendChild(errTitle);
    errDiv.appendChild(errMsg);
    errDiv.appendChild(retryBtn);
    container.appendChild(errDiv);
  }
});

// Load and render the team's unblock history
async function loadHistory() {
  const historyContainer = document.getElementById("history-section");
  const pagination = document.getElementById("pagination");
  
  historyContainer.textContent = '';
  const _loadDiv = document.createElement('div'); _loadDiv.className = 'text-center py-4';
  const _spinner = document.createElement('div'); _spinner.className = 'spinner-border spinner-border-sm custom-text-primary mb-2'; _spinner.setAttribute('role', 'status');
  const _loadTxt = document.createElement('p'); _loadTxt.className = 'custom-text-muted mb-0'; _loadTxt.textContent = _t('loading');
  _loadDiv.appendChild(_spinner); _loadDiv.appendChild(_loadTxt);
  historyContainer.appendChild(_loadDiv);

  try {
    const response = await CTFd.fetch("/api/v1/attempts_remover/my_history", { credentials: "same-origin" });
    const history = await response.json();

    if (!history || history.length === 0) {
      historyContainer.textContent = '';
      const _emptyDiv = document.createElement('div'); _emptyDiv.className = 'text-center py-4';
      const _emptyIcon = document.createElement('i'); _emptyIcon.className = 'fas fa-info-circle custom-text-muted fa-2x mb-2';
      const _emptyTxt = document.createElement('p'); _emptyTxt.className = 'custom-text-muted mb-0'; _emptyTxt.textContent = _t('history_empty');
      _emptyDiv.appendChild(_emptyIcon); _emptyDiv.appendChild(_emptyTxt);
      historyContainer.appendChild(_emptyDiv);
      pagination.style.display = "none";
      return;
    }

    const itemsPerPage = 5;
    let currentPage = 1;
    const totalPages = Math.ceil(history.length / itemsPerPage);

    function renderPage(page) {
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const currentLogs = history.slice(start, end);

      historyContainer.innerHTML = "";

      const tableWrapper = document.createElement('div');
      tableWrapper.className = 'table-responsive';
      
      const table = document.createElement("table");
      table.className = "table table-hover history-table";

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      
      const headers = [_t('history_col_challenge'), _t('history_col_processed_by'), _t('history_col_type'), _t('history_col_cost'), _t('history_col_processed_on')];
      headers.forEach(text => {
        const th = document.createElement("th");
        th.textContent = text;
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      currentLogs.forEach(log => {
        const tr = document.createElement("tr");

        const tdName = document.createElement("td");
        const nameDiv = document.createElement('div');
        nameDiv.className = 'd-flex align-items-center';
        const flagIcon = document.createElement('i');
        flagIcon.className = 'fas fa-flag custom-text-info mr-3';
        const nameText = document.createElement('span');
        nameText.textContent = log.challenge_name;
        nameText.className = 'font-weight-medium custom-text-primary';
        nameDiv.appendChild(flagIcon);
        nameDiv.appendChild(nameText);
        tdName.appendChild(nameDiv);
        tr.appendChild(tdName);

        // Admin
        const tdAdmin = document.createElement("td");
        const adminDiv = document.createElement('div');
        adminDiv.className = 'd-flex align-items-center';
        const adminIcon = document.createElement('i');
        adminIcon.className = 'fas fa-user-shield custom-text-info mr-3';
        const adminText = document.createElement('span');
        adminText.textContent = log.admin_name;
        adminText.className = 'custom-text-primary';
        adminDiv.appendChild(adminIcon);
        adminDiv.appendChild(adminText);
        tdAdmin.appendChild(adminDiv);
        tr.appendChild(tdAdmin);

        // Type
        const tdType = document.createElement("td");
        const typeDiv = document.createElement('div');
        typeDiv.className = 'd-flex align-items-center';
        const typeIcon = document.createElement('i');
        typeIcon.className = log.type === 'full' ? 'fas fa-unlock custom-text-danger mr-3' : 'fas fa-plus custom-text-success mr-3';
        const typeText = document.createElement('span');
        typeText.textContent = log.type === 'full' ? _t('type_full_unblock') : _t('type_single_attempt');
        typeText.className = 'custom-text-primary';
        typeDiv.appendChild(typeIcon);
        typeDiv.appendChild(typeText);
        tdType.appendChild(typeDiv);
        tr.appendChild(tdType);

        // Penalty cost
        const tdCost = document.createElement("td");
        const costDiv = document.createElement('div');
        costDiv.className = 'd-flex align-items-center';
        const costIcon = document.createElement('i');
        costIcon.className = 'fas fa-coins text-danger mr-3';
        const costText = document.createElement('span');
        costText.textContent = `-${log.cost} pts`;
        costText.className = 'font-weight-bold text-danger';
        costDiv.appendChild(costIcon);
        costDiv.appendChild(costText);
        tdCost.appendChild(costDiv);
        tr.appendChild(tdCost);

        const tdDate = document.createElement("td");
        const dateDiv = document.createElement('div');
        dateDiv.className = 'custom-text-muted';
        const calIcon = document.createElement('i');
        calIcon.className = 'fas fa-calendar-alt mr-3';
        const dateText = document.createElement('span');
        const date = new Date(log.timestamp);
        dateText.textContent = date.toLocaleString();
        dateDiv.appendChild(calIcon);
        dateDiv.appendChild(dateText);
        tdDate.appendChild(dateDiv);
        tr.appendChild(tdDate);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      tableWrapper.appendChild(table);
      historyContainer.appendChild(tableWrapper);
    }

    function renderPagination() {
      while (pagination.firstChild) pagination.removeChild(pagination.firstChild);
      if (totalPages <= 1) { pagination.style.display = "none"; return; }
      pagination.style.display = "";
      for (let i = 1; i <= totalPages; i++) {
        const li = document.createElement("li");
        li.className = "page-item" + (i === currentPage ? " active" : "");
        const a = document.createElement("a");
        a.className = "page-link";
        a.href = "#";
        a.textContent = i;
        a.addEventListener("click", (e) => {
          e.preventDefault();
          currentPage = i;
          renderPage(currentPage);
          renderPagination();
        });
        li.appendChild(a);
        pagination.appendChild(li);
      }
    }

    renderPage(currentPage);
    renderPagination();

    // Compute and display the cumulative penalty cost
    const totalCost = history.reduce((sum, log) => sum + (log.cost || 0), 0);
    if (totalCost > 0) {
      const totalDiv = document.createElement('div');
      totalDiv.className = 'custom-alert-info p-3 mt-3 text-center';
      totalDiv.style.borderRadius = '12px';
      totalDiv.style.borderLeft = '4px solid var(--custom-danger)';
      
      const totalIcon = document.createElement('i');
      totalIcon.className = 'fas fa-calculator custom-text-info mr-3';
      
      const totalText = document.createElement('span');
      // totalText.className = 'font-weight-bold custom-text-primary';
      totalText.textContent = _t('total_cost', { total: totalCost });
      
      // totalDiv.appendChild(totalIcon);
      totalDiv.appendChild(totalText);
      
      // Insert the total row above the pagination controls
      const paginationParent = pagination.parentNode;
      paginationParent.insertBefore(totalDiv, pagination);
    }

  } catch (e) {
    console.error(e);
    historyContainer.textContent = '';
    const _errDiv = document.createElement('div'); _errDiv.className = 'text-center py-4';
    const _errIcon = document.createElement('i'); _errIcon.className = 'fas fa-exclamation-triangle text-danger fa-2x mb-2';
    const _errTxt = document.createElement('p'); _errTxt.className = 'text-danger mb-0'; _errTxt.textContent = _t('history_load_error');
    _errDiv.appendChild(_errIcon); _errDiv.appendChild(_errTxt);
    historyContainer.appendChild(_errDiv);
  }
}
</script>
